# Required secrets: SSH_HOST, SSH_PORT, SSH_USER_NAME, SSH_PASSWORD,
#                   SERVER_DEFAULT_PATH, PROJECT_NAME
name: main-deploy

run-name: >
  ${{ github.event_name == 'workflow_dispatch' && '🛠️ 수동 릴리즈 실행' || '🚀 릴리즈 자동 생성' }}
  #${{ github.run_number }}
  by @${{ github.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── 1. 타입 체크 + 린트 ────────────────────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn check-types

      - name: Lint
        run: yarn lint

  # ── 2. 소스 압축 → SCP → 서버 빌드 ───────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: verify

    env:
      DEPLOY_DIR: ${{ secrets.SERVER_DEFAULT_PATH }}/${{ github.ref_name }}-${{ secrets.PROJECT_NAME }}
      SRC_ARCHIVE: source.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Compress source
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.next' \
              --exclude='*.db' \
              --exclude='.env*' \
              --exclude='docs/screenshots' \
              -czf ${{ env.SRC_ARCHIVE }} .

      - name: Upload source archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER_NAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "${{ env.SRC_ARCHIVE }}"
          target: "${{ env.DEPLOY_DIR }}"

      - name: Extract & build on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER_NAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            tar -xzf "${{ env.SRC_ARCHIVE }}" --overwrite
            rm -f "${{ env.SRC_ARCHIVE }}"
            docker compose up --build -d --remove-orphans

      - name: GitHub Summary
        shell: bash
        run: |
          echo "## 배포 완료 — ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 서버 | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 경로 | \`${{ env.DEPLOY_DIR }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 포함된 커밋" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(jq '.commits | length // 0' $GITHUB_EVENT_PATH 2>/dev/null || echo "0")
          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            echo "- \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            jq -r '.commits[:10][] | "- " + ((.message | split("\n")[0] // "") | gsub("`"; "'\''")) + " (`" + (.id | .[0:7]) + "`)"' \
              $GITHUB_EVENT_PATH >> $GITHUB_STEP_SUMMARY
            if [ "$TOTAL" -gt 10 ] 2>/dev/null; then
              echo "- ... (외 $((TOTAL - 10))개)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
